<!doctype html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hermes 動態報表 GitHub Pages 試驗</title>
  <style>
    :root { color-scheme: dark; --bg:#08111f; --card:#101d33; --card2:#142540; --txt:#ecf4ff; --muted:#9fb2cc; --red:#ff5d6c; --green:#42d392; --amber:#ffd166; --blue:#6ea8fe; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:radial-gradient(circle at 20% 0%, #193b65 0%, var(--bg) 42%, #050912 100%); color:var(--txt); }
    main { max-width:1180px; margin:0 auto; padding:32px 18px 56px; }
    .hero { display:grid; gap:14px; margin-bottom:22px; }
    .kicker { color:var(--amber); font-weight:800; letter-spacing:.08em; font-size:13px; }
    h1 { margin:0; font-size:clamp(28px, 5vw, 54px); line-height:1.02; }
    .sub { color:var(--muted); font-size:16px; max-width:760px; line-height:1.65; }
    .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin:22px 0; }
    .card { background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03)); border:1px solid rgba(255,255,255,.12); border-radius:22px; padding:18px; box-shadow:0 12px 35px rgba(0,0,0,.24); }
    .label { color:var(--muted); font-size:13px; margin-bottom:8px; }
    .num { font-size:30px; font-weight:900; }
    .up { color:var(--red); } .down { color:var(--green); } .blue { color:var(--blue); }
    .panel { display:grid; grid-template-columns:1.2fr .8fr; gap:14px; }
    table { width:100%; border-collapse:collapse; overflow:hidden; border-radius:16px; }
    th,td { padding:12px 10px; border-bottom:1px solid rgba(255,255,255,.08); text-align:left; }
    th { color:var(--muted); font-size:12px; letter-spacing:.04em; }
    .bar { height:10px; border-radius:99px; background:#243958; overflow:hidden; }
    .bar span { display:block; height:100%; background:linear-gradient(90deg, var(--blue), var(--amber)); border-radius:99px; }
    .pill { display:inline-flex; border-radius:99px; padding:5px 9px; background:rgba(255,255,255,.08); color:var(--muted); font-size:12px; }
    button { cursor:pointer; border:0; border-radius:12px; padding:10px 14px; color:#07101f; background:var(--amber); font-weight:800; }
    footer { color:var(--muted); font-size:12px; margin-top:22px; }
    @media (max-width:860px){ .grid{grid-template-columns:repeat(2,1fr)} .panel{grid-template-columns:1fr} }
  </style>
</head>
<body>
<main>
  <section class="hero">
    <div class="kicker">GITHUB PAGES TEST · CLIENT-SIDE DYNAMIC HTML</div>
    <h1>Hermes 動態報表 HTML 試驗</h1>
    <div class="sub">這不是目前正式投資報表；這是一個獨立測試頁，用來驗證：Hermes 產生的互動式 HTML / CSS / JavaScript 報表，可以發布到 GitHub Pages，並透過網址開啟。</div>
  </section>

  <section class="grid" id="stats"></section>

  <section class="panel">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px">
        <div><div class="label">模擬主動 ETF 持股訊號</div><strong>互動式排序表</strong></div>
        <button id="shuffle">重新模擬</button>
      </div>
      <table>
        <thead><tr><th>股票</th><th>主題</th><th>ETF 共識</th><th>訊號分數</th><th>動作</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
    <div class="card">
      <div class="label">動態區塊</div>
      <h2 style="margin:0 0 12px">目前判讀</h2>
      <p id="summary" style="line-height:1.7;color:var(--muted)"></p>
      <div id="bars" style="display:grid;gap:12px;margin-top:18px"></div>
    </div>
  </section>

  <footer>
    產生時間：<span id="generated"></span>｜資料為測試假資料，不代表任何投資建議。此頁不讀取任何私有資料或正式報表檔案。
  </footer>
</main>
<script>
const names = [
  ['2330','台積電','AI 算力'], ['2308','台達電','電源/散熱'], ['2383','台光電','高速材料'], ['2345','智邦','網通'], ['3017','奇鋐','散熱'], ['2454','聯發科','IC 設計'], ['3665','貿聯-KY','高速傳輸'], ['3037','欣興','載板']
];
function rand(min,max){ return Math.round((min + Math.random()*(max-min))*10)/10; }
function makeData(){
  return names.map(([code,name,theme])=>({code,name,theme, consensus: Math.floor(rand(2,8)), score: rand(55,96)}))
    .sort((a,b)=>b.score-a.score);
}
function render(){
  const data = makeData();
  const avg = Math.round(data.reduce((s,x)=>s+x.score,0)/data.length*10)/10;
  const hot = data.filter(x=>x.score>=80).length;
  document.getElementById('stats').innerHTML = `
    <div class="card"><div class="label">測試標的數</div><div class="num blue">${data.length}</div></div>
    <div class="card"><div class="label">高分訊號</div><div class="num up">${hot}</div></div>
    <div class="card"><div class="label">平均分數</div><div class="num">${avg}</div></div>
    <div class="card"><div class="label">部署方式</div><div class="num" style="font-size:22px">GitHub Pages</div></div>`;
  document.getElementById('rows').innerHTML = data.map(x=>{
    const action = x.score >= 85 ? '強勢觀察' : x.score >= 72 ? '等回檔' : '僅追蹤';
    const cls = x.score >= 85 ? 'up' : x.score >= 72 ? 'blue' : '';
    return `<tr><td><strong>${x.code}</strong> ${x.name}</td><td>${x.theme}</td><td>${x.consensus} 檔</td><td class="${cls}">${x.score}</td><td><span class="pill">${action}</span></td></tr>`;
  }).join('');
  document.getElementById('summary').textContent = `這個頁面使用前端 JavaScript 即時計算與渲染假資料；每次按下「重新模擬」會重新排序分數，代表 GitHub Pages 可以承載不需要後端的動態互動報表。`;
  document.getElementById('bars').innerHTML = data.slice(0,5).map(x=>`<div><div style="display:flex;justify-content:space-between"><span>${x.code} ${x.name}</span><span>${x.score}</span></div><div class="bar"><span style="width:${x.score}%"></span></div></div>`).join('');
}
document.getElementById('generated').textContent = new Date().toLocaleString('zh-TW', { timeZone:'Asia/Taipei' });
document.getElementById('shuffle').addEventListener('click', render);
render();
</script>
</body>
</html>
