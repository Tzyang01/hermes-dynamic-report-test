<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>投資動態報表中心</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Microsoft JhengHei",sans-serif;background:#0c0e14;color:#eaecf2;min-height:100vh;padding:40px 20px}
.wrap{max-width:640px;margin:0 auto}
h1{font-size:22px;font-weight:800;margin-bottom:6px}
.sub{font-size:13px;color:#5a6178;margin-bottom:28px}
.grid{display:flex;flex-direction:column;gap:12px}
.rc{background:#141822;border:1px solid #252a3a;border-radius:12px;padding:18px 20px;text-decoration:none;color:inherit;transition:border-color .15s,transform .1s}
.rc:hover{border-color:#5b9cf6;transform:translateY(-1px)}
.rn{font-size:16px;font-weight:700;margin-bottom:4px}
.rt{font-size:12px;color:#9ba3b8}
.rm{font-size:11px;color:#5a6178;margin-top:6px}
.ro{font-size:12px;color:#5b9cf6;margin-top:8px;font-weight:600}
</style>
</head>
<body>
<div class="wrap">
<h1>📊 投資動態報表中心</h1>
<p class="sub">Hermes Agent 自動產出 · 點擊卡片開啟報表</p>
<div class="grid" id="reports"></div>
</div>
<script>
var REPORTS = [{"id":"active-etf-analysis","name":"主動ETF持股分析報告","updated":"2026-04-29 07:50:56 CST","url":"reports/active-etf-analysis/latest.html?v=20260429075056","bytes":20397},
{"id":"active-etf-holdings-change","name":"ETF持股異動報告","updated":"2026-04-28 22:51:37 CST","url":"reports/active-etf-holdings-change/latest.html","bytes":64054},
{"id":"active-etf-morning-brief","name":"20260429晨報","updated":"2026-04-29 07:14:36 CST","url":"reports/active-etf-morning-brief/latest.html","bytes":8849},
{"id":"stock-3711-analysis","name":"3711日月光投控個股分析","updated":"2026-04-28 23:30:00 CST","url":"reports/stock-3711-analysis/latest.html","bytes":47655}];
function esc(v){return String(v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;")}
document.getElementById("reports").innerHTML = REPORTS.map(function(r){
  return '<a class="rc" href="'+esc(r.url)+'">'+
    '<div class="rn">'+esc(r.name)+'</div>'+
    '<div class="rt">更新：'+esc(r.updated)+'</div>'+
    '<div class="rm">獨立 HTML · '+Number(r.bytes||0).toLocaleString()+' bytes</div>'+
    '<div class="ro">開啟報表 →</div></a>';
}).join("");
</script>
</body>
</html>
