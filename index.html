<!doctype html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>投資動態報表中心</title>
  <style>
    :root {
      --bg:#07111f; --panel:#0e1b2f; --panel2:#132541; --line:rgba(255,255,255,.12);
      --txt:#edf5ff; --muted:#98abc6; --gold:#ffd166; --blue:#6ea8fe; --red:#ff5d6c; --green:#42d392;
    }
    * { box-sizing:border-box; }
    html, body { height:100%; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif; color:var(--txt); background:radial-gradient(circle at 12% -10%, #214b7c 0%, var(--bg) 42%, #03070d 100%); overflow:hidden; }
    .app { height:100vh; display:grid; grid-template-rows:auto 1fr; gap:12px; padding:14px; }
    .top-frame { background:linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.04)); border:1px solid var(--line); border-radius:22px; padding:16px; box-shadow:0 14px 42px rgba(0,0,0,.25); }
    .title-row { display:flex; justify-content:space-between; align-items:flex-end; gap:18px; margin-bottom:14px; }
    h1 { margin:0; font-size:clamp(22px,3vw,36px); letter-spacing:.02em; }
    .caption { color:var(--muted); font-size:13px; line-height:1.5; }
    .buttons { display:flex; flex-wrap:wrap; gap:12px; }
    .report-btn { min-width:230px; border:1px solid var(--line); background:var(--panel); color:var(--txt); border-radius:18px; padding:13px 15px; text-align:left; cursor:pointer; transition:.18s ease; }
    .report-btn:hover { transform:translateY(-1px); border-color:rgba(255,209,102,.5); background:var(--panel2); }
    .report-btn.active { outline:2px solid var(--gold); background:linear-gradient(135deg, rgba(255,209,102,.18), rgba(110,168,254,.12)); }
    .btn-name { display:block; font-weight:900; font-size:16px; margin-bottom:6px; }
    .btn-time { display:block; color:var(--muted); font-size:12px; }
    .content-frame { min-height:0; background:#fff; border:1px solid var(--line); border-radius:22px; overflow:hidden; box-shadow:0 14px 42px rgba(0,0,0,.28); position:relative; }
    iframe { width:100%; height:100%; border:0; background:#fff; display:block; }
    .placeholder { position:absolute; inset:0; display:grid; place-items:center; text-align:center; color:#20324c; background:linear-gradient(135deg,#f7fbff,#eaf2ff); padding:28px; }
    .placeholder h2 { margin:0 0 8px; }
    .badge { display:inline-flex; padding:5px 9px; border-radius:999px; background:rgba(255,209,102,.16); color:var(--gold); border:1px solid rgba(255,209,102,.3); font-size:12px; }
    @media (max-width:760px) { body { overflow:auto; } .app { height:auto; min-height:100vh; } .content-frame { height:70vh; } .title-row { display:block; } .caption { margin-top:8px; } .report-btn { min-width:100%; } }
  </style>
</head>
<body>
  <main class="app">
    <section class="top-frame" aria-label="報表選單 Frame">
      <div class="title-row">
        <div>
          <span class="badge">GitHub Pages · Dynamic HTML Reports</span>
          <h1>投資動態報表中心</h1>
        </div>
        <div class="caption">上方是報表按鈕區；每個按鈕下方顯示該報表更新時間。下方 Frame 會載入被選取報表的獨立 HTML 檔案。</div>
      </div>
      <div class="buttons" id="buttons"></div>
    </section>
    <section class="content-frame" aria-label="報表內容 Frame">
      <div class="placeholder" id="placeholder"><div><h2>請選擇上方報表</h2><p>報表會以獨立 HTML 檔案載入在這個 Frame 中，不會把所有報表塞在同一個檔案。</p></div></div>
      <iframe id="viewer" title="報表內容" hidden></iframe>
    </section>
  </main>
<script>
const REPORTS = [
  {
    "id": "active-etf-analysis",
    "name": "主動ETF持股分析報告",
    "updated": "2026-04-23 19:32:57 CST",
    "url": "reports/active-etf-analysis/latest.html",
    "source": "/Users/ch/Documents/Claude/Projects/主動式ETF/reports/主動ETF持股報告_新版.html",
    "bytes": 18243
  },
  {
    "id": "active-etf-holdings-change",
    "name": "ETF持股異動報告",
    "updated": "2026-04-23 22:07:05 CST",
    "url": "reports/active-etf-holdings-change/latest.html",
    "source": "/Users/ch/Documents/Claude/Projects/主動式ETF/reports/主動式ETF持股異動總覽_20260423.html",
    "bytes": 68288
  }
];
const buttons = document.getElementById('buttons');
const viewer = document.getElementById('viewer');
const placeholder = document.getElementById('placeholder');
function showReport(id) {
  const report = REPORTS.find(r => r.id === id) || REPORTS[0];
  document.querySelectorAll('.report-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.id === report.id));
  viewer.src = report.url + '?v=' + encodeURIComponent(report.updated);
  viewer.hidden = false;
  placeholder.style.display = 'none';
  location.hash = report.id;
}
function renderButtons() {
  buttons.innerHTML = REPORTS.map(r => ).join('');
}
renderButtons();
const initial = decodeURIComponent(location.hash.replace('#',''));
if (initial && REPORTS.some(r => r.id === initial)) showReport(initial);
else if (REPORTS.length) showReport(REPORTS[0].id);
</script>
</body>
</html>
